server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip — MkDocs HTML is text-heavy (search index, big TOC), so gzip
    # makes a real difference on slow networks (~80% size reduction).
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/manifest+json
        image/svg+xml
        font/woff
        font/woff2;

    # Cache static assets long-term — MkDocs Material adds content
    # hashes to JS/CSS filenames so cache-busting is automatic on rebuild.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # MkDocs uses directory-based URLs (e.g. /modules/paxlog/) — nginx
    # needs $uri/ in the try_files chain to find index.html in dirs.
    location / {
        try_files $uri $uri/ /404.html;
    }

    # MkDocs Material 404 page
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "interest-cohort=()" always;
}
