server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Service worker — JAMAIS d'immutable cache (sinon les deploys ne se propagent plus cote client).
    # Doit etre revalide a chaque requete : c'est le SW qui pilote le cache des chunks.
    # Sans cela, un client avec un ancien SW continue de pointer sur les anciens chunks immutable=1y.
    location = /sw.js {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        try_files $uri =404;
    }

    # Workbox helper (Vite PWA / registerSW). Pas content-hashed -> pas d'immutable.
    location = /registerSW.js {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }

    # Web app manifest — courte duree (peut bouger entre deploys, pas content-hashed).
    location = /manifest.webmanifest {
        expires off;
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    # index.html — JAMAIS de cache (point d'entree, refs les hashes des chunks).
    location = /index.html {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # Cache static assets — uniquement les fichiers content-hashed dans /assets/
    # (les chunks Vite ont un hash dans leur nom -> immutable safe).
    location ~* ^/assets/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Autres assets statiques racine (favicon, images, fonts hors /assets/) — cache court.
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # SPA fallback — serve file if exists, otherwise index.html
    # NOTE: $uri/ removed to avoid 403 when route matches a real directory (e.g. /assets)
    location / {
        try_files $uri /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
