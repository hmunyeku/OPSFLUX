site_name: OpsFlux
site_description: ERP industriel modulaire — opérations, conformité, projets, logistique
site_url: https://docs.opsflux.io/
repo_url: https://github.com/hmunyeku/OPSFLUX
repo_name: hmunyeku/OPSFLUX
edit_uri: edit/main/docs/

docs_dir: docs

# Validation policy
# Many legacy specs in developer/* have hand-written anchors that don't
# match MkDocs slugify (French accents). We log warnings rather than
# abort — fixed module by module as docs are migrated to the canonical
# template (the paxlog user-facing doc is the model).
validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn

theme:
  name: material
  language: fr
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - navigation.tracking
    - navigation.path
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit
    - content.tabs.link
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Mode sombre
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Mode clair
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

plugins:
  - search:
      lang: fr
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
      fallback_to_build_date: true

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: "#"
      toc_depth: 3
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/hmunyeku/OPSFLUX
  generator: false

copyright: >
  &copy; OpsFlux. Usage interne — propriétaire.

# Navigation
# Two top-level tabs reflecting two audiences :
#   - "Utilisateur" → free, public access, served at /enduser/
#   - "Développeur" → gated by Traefik basicAuth (see DEPLOY_VPS.md),
#                     served at /developer/
# A user without dev creds sees the Développeur tab in the nav but
# clicking pages under it returns 401 until they authenticate.
nav:
  - Accueil: index.md

  - Utilisateur:
    - Vue d'ensemble: enduser/getting-started/overview.md
    - Démarrage:
      - Stack technique: enduser/getting-started/stack.md
      - Déployer sur un VPS: enduser/getting-started/deploy.md
    - Modules:
      - Vue d'ensemble: enduser/modules/index.md
      - PaxLog: enduser/modules/paxlog.md
      - MOC (Management of Change): enduser/modules/MOC.md
      - TravelWiz: enduser/modules/travelwiz.md
      - Tiers: enduser/modules/tiers.md
      - Asset Registry: enduser/modules/asset-registry.md
      # 10 modules à venir (template paxlog)

  - Développeur:
    - Architecture:
      - Vue système: developer/architecture/system-overview.md
      - Référence Core: developer/architecture/core-reference.md
      - Modèle d'exécution PDCA: developer/architecture/pdca-execution.md
      - Workflows cross-modules: developer/architecture/cross-module-workflows.md
      - Règles UI/UX: developer/architecture/ui-ux-rules.md
      - Resolvers home modules: developer/architecture/home-resolvers.md
    - Spécifications modules:
      - Asset Registry: developer/modules-spec/ASSET_REGISTRY.md
      - Conformité: developer/modules-spec/CONFORMITE.md
      - Dashboard: developer/modules-spec/DASHBOARD.md
      - Imputations: developer/modules-spec/IMPUTATIONS.md
      - Messaging: developer/modules-spec/MESSAGING.md
      - Papyrus: developer/modules-spec/PAPYRUS.md
      - PaxLog: developer/modules-spec/PAXLOG.md
      - PID/PFD: developer/modules-spec/PID_PFD.md
      - Planner: developer/modules-spec/PLANNER.md
      - Projets: developer/modules-spec/PROJETS.md
      - Report Editor: developer/modules-spec/REPORT_EDITOR.md
      - Support: developer/modules-spec/SUPPORT.md
      - Tiers: developer/modules-spec/TIERS.md
      - TravelWiz: developer/modules-spec/TRAVELWIZ.md
      - Workflow: developer/modules-spec/WORKFLOW.md
    - Workflows:
      - ADS: developer/workflows/ads.md
      - AVM: developer/workflows/avm.md
      - Document (Papyrus): developer/workflows/document.md
      - PID: developer/workflows/pid.md
      - Support ticket: developer/workflows/support-ticket.md
      - Matrice objets workflow: developer/workflows/driven-objects.md
    - Permissions:
      - Matrice rôle/vue/permission: developer/permissions/role-view.md
      - Matrice rôle → permission: developer/permissions/role-to-permission.md
      - Permissions par module/vue: developer/permissions/module-view.md
      - Matrice statut/action: developer/permissions/status-action.md
      - Endpoint × owner_type: developer/permissions/endpoint-owner-type.md
      - Routes/permission: developer/permissions/route-permission.md
    - Modèle de données:
      - Org/Asset audit: developer/data-model/org-asset-model.md
      - Entity / BU / Asset: developer/data-model/entity-bu-asset.md
      - Composants polymorphes: developer/data-model/reusable-polymorphic.md
      - Module Imputations cible: developer/data-model/imputation-target.md
      - owner_types autorisés: developer/data-model/owner-types-security.md
    - Explications:
      - Workflow ADS contact: developer/explainers/ads-contact-workflow.md
      - Workflow AVM: developer/explainers/avm-workflow.md
      - State machine PaxLog: developer/explainers/pax-state-machine.md
    - Qualité:
      - Plan code sécurité: developer/quality/security-code-plan.md
      - Analyse fonctionnelle profonde: developer/quality/deep-functional-analysis.md
      - Acceptance tests: developer/quality/acceptance-tests.md
      - Dataset de référence: developer/quality/test-dataset.md
    - ADR:
      - "001 — Form validation": developer/adr/001-form-validation.md
      - "002 — Monster files refactor": developer/adr/002-monster-files-refactor.md
      - "003 — KMZ import workflow": developer/adr/003-kmz-import-workflow.md
    - Référence:
