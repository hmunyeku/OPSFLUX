# =============================================================================
# OpsFlux — Production Docker Compose (Dokploy)
# =============================================================================
# Dokploy creates .env from compose environment settings.
# Domains & SSL managed by Dokploy's built-in Traefik.

services:
  # ─── PostgreSQL 16 + pgvector + PostGIS ──────────────────────
  db:
    build:
      context: ./docker
      dockerfile: Dockerfile.postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-opsflux}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis 7 ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ─── Backend FastAPI ─────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/opt/opsflux/static
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
      "

  # ─── Frontend React PWA (nginx) ─────────────────────────────
  frontend:
    build:
      context: ./apps/main
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://api.${DOMAIN:-opsflux.io}
    restart: unless-stopped

  # ─── Draw.io (self-hosted — module PID/PFD) ─────────────────
  drawio:
    image: jgraph/drawio:latest
    restart: unless-stopped
    environment:
      DRAWIO_SELF_CONTAINED: "1"

volumes:
  pg_data:
  uploads_data:
