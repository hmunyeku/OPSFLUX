# =============================================================================
# OPSFLUX Agent Worker Pool — opt-in companion compose
# =============================================================================
#
# This project runs alongside the main OPSFLUX stack. Keep it out of the
# main compose on purpose:
#   * Installs that don't want the autonomous maintenance agent never
#     build this image.
#   * A broken worker build during development cannot take down the API.
#   * The pool can scale horizontally without touching the backend.
#
# Both projects share the external `dokploy-network` so the worker
# reaches the main Postgres (service name `db`) and backend HTTP
# (service name `backend`) by DNS without any external URL.
#
# Deploy steps (reproducible, no out-of-band config):
#   1. In Dokploy, create a second "Docker Compose" project in the SAME
#      parent project as OPSFLUX, pointing at this repo path:
#          agent-worker/docker-compose.yml
#   2. Paste the env vars below. All four MUST match what the main
#      OPSFLUX backend uses (same Postgres, same ENCRYPTION_KEY,
#      same OPSFLUX_INTERNAL_TOKEN):
#
#        POSTGRES_USER=postgres            # same as main project
#        POSTGRES_PASSWORD=...             # same as main project
#        POSTGRES_DB=opsflux               # same as main project
#        ENCRYPTION_KEY=...                # same as main project
#        OPSFLUX_INTERNAL_TOKEN=...        # same as main project
#
#   3. Deploy. Each replica auto-registers in `agent_worker_pool` and
#      starts polling `support_agent_runs` for pending work.
#
# The worker image is built from `./Dockerfile`. CI
# (`.github/workflows/agent-worker-image.yml`) also pushes it to
# `ghcr.io/hmunyeku/opsflux-agent-worker:latest` so a fresh install
# can skip the local build and pull directly.

services:
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/hmunyeku/opsflux-agent-worker:latest
    restart: unless-stopped
    environment:
      # Point at the main OPSFLUX Postgres via Docker DNS. Container
      # names on the shared `dokploy-network` are the only reliable
      # DNS aliases, so we default to the Dokploy naming scheme
      # `<project-slug>-db-1`. Override via POSTGRES_HOST if your
      # install uses a different slug or a non-Dokploy setup.
      # No driver prefix — asyncpg on the worker side handles that
      # itself.
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@${POSTGRES_HOST:-opsflux-3gj1u6-db-1}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-opsflux}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      OPSFLUX_API_URL: ${OPSFLUX_API_URL:-http://backend:8000}
      OPSFLUX_INTERNAL_TOKEN: ${OPSFLUX_INTERNAL_TOKEN}
      AGENT_IMAGE: ${AGENT_IMAGE:-ghcr.io/hmunyeku/opsflux-agent-runner:latest}
      WORKER_NAME: ${WORKER_NAME:-}
      WORKTREE_ROOT: /var/opsflux/agent-runs
      LOG_ROOT: /var/log/opsflux-agent
      # Persistent bare-clone cache shared across runs. First run per
      # repo does a full `git clone --mirror`; subsequent runs just
      # `git fetch --prune` and `git clone --reference` from the cache.
      # Turns a ~30-60s clone into a ~2s one.
      AGENT_REPO_CACHE_ROOT: /var/opsflux/agent-cache
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      # Launch child containers via the host Docker daemon.
      - /var/run/docker.sock:/var/run/docker.sock
      # Worktrees and logs are mounted both into the worker AND into
      # each child runner container at the same path — host paths must
      # line up or the agent can't read its mission / write its report.
      - /var/opsflux/agent-runs:/var/opsflux/agent-runs
      - /var/log/opsflux-agent:/var/log/opsflux-agent
      # Named volume so the bare-clone cache survives worker restarts
      # and redeploys. Shared between the 2 replicas (concurrent
      # `git fetch` on the same cache is safe — git locks internally).
      - agent-repo-cache:/var/opsflux/agent-cache
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 512M
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true

volumes:
  agent-repo-cache: {}
