<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- Hexagon background -->
  <polygon
    points="256,20 468,140 468,372 256,492 44,372 44,140"
    fill="url(#bg)"
    stroke="#1e3a8a"
    stroke-width="8"
  />
  <!-- Letter O -->
  <text
    x="256" y="296"
    font-family="Inter, system-ui, sans-serif"
    font-size="220"
    font-weight="700"
    fill="#ffffff"
    text-anchor="middle"
    dominant-baseline="central"
  >O</text>
  <!-- Small F subscript -->
  <text
    x="358" y="370"
    font-family="Inter, system-ui, sans-serif"
    font-size="100"
    font-weight="600"
    fill="rgba(255,255,255,0.85)"
    text-anchor="middle"
    dominant-baseline="central"
  >F</text>
</svg>
