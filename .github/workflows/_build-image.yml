name: _build-image (reusable)

# Reusable workflow — builds and pushes a Docker image from
# ./<image>/Dockerfile to ghcr.io/<owner>/opsflux-<image>.
# Called by agent-images.yml for agent-runner, agent-worker,
# playwright-runner.

on:
  workflow_call:
    inputs:
      image:
        description: 'Folder name under repo root (also used as image suffix)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/opsflux-${{ inputs.image }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v5
        with:
          context: ./${{ inputs.image }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Pass the commit SHA into the build so the image embeds
          # it as a label and env var — makes it trivial to verify
          # which version is actually running in production.
          build-args: |
            AGENT_RUNNER_BUILD_SHA=${{ github.sha }}
          cache-from: type=gha,scope=${{ inputs.image }}
          cache-to: type=gha,mode=max,scope=${{ inputs.image }}
